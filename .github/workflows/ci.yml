name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Dummy values so Next.js can build without real credentials in CI.
      # Real secrets are set in Vercel's environment, not here.
      OPENAI_API_KEY: ci-placeholder
      OPENAI_BASE_URL: https://api.openai.com/v1
      OPENAI_MODEL: gpt-4o-mini
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-at-least-32-characters-long-placeholder
      AUTH_ADMIN_EMAIL: ci@example.com
      AUTH_ADMIN_PASSWORD_HASH: $2b$12$placeholder.hash.for.ci.build.only.xxxxxxxxxx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
